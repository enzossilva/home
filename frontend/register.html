<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro — Young Zone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Young Zone</h1>
    <nav>
      <a href="index.html">Produtos</a>
      <a href="login.html">Login</a>
      <a href="register.html">Cadastro</a>
      <a href="cart.html">Carrinho</a>
    </nav>
  </header>

  <main class="form-page">
    <div class="form-card">
      <h2>Cadastro</h2>
      <div id="message"></div>
      <form id="registerForm">
        <label>Nome</label>
        <input type="text" id="name" placeholder="Seu nome" required />

        <label>Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required />

        <label>Senha</label>
        <input type="password" id="password" placeholder="••••••" required />

        <button type="submit">Cadastrar</button>
      </form>
      <p class="form-link">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </main>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const msg = document.getElementById('message');
      msg.innerHTML = '';

      fetch('http://localhost:8080/users/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.erro) {
          msg.innerHTML = `<p class="error">${data.erro}</p>`;
        } else {
          msg.innerHTML = '<p class="success">Cadastro realizado! Redirecionando...</p>';
          setTimeout(() => window.location.href = 'login.html', 1000);
        }
      })
      .catch(() => msg.innerHTML = '<p class="error">Erro ao conectar com o servidor.</p>');
    });
  </script>
</body>
</html>
