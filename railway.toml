[build]
buildCommand = "cd react-frontend && npm install && npm run build && mkdir -p ../demo/src/main/resources/static && cp -r dist/* ../demo/src/main/resources/static/ && cd ../demo && ./mvnw clean package -DskipTests"

[deploy]
startCommand = "java -jar demo/target/demo-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/products"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
