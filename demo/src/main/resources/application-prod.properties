# ── Produção — todas as variáveis vêm do painel do Railway ──
# Acesse railway.app → seu projeto → Variables → e adicione cada uma abaixo

# ── Banco de dados ─────────────────────────────────────────
# Railway fornece PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automaticamente
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}

# ── Mercado Pago ───────────────────────────────────────────
# Variável: MP_ACCESS_TOKEN
# Variável: MP_PUBLIC_KEY
mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.public-key=${MP_PUBLIC_KEY}

# ── JWT ────────────────────────────────────────────────────
# Variável: JWT_SECRET  (gere uma string longa e aleatória)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Email (Gmail) ──────────────────────────────────────────
# Variável: MAIL_USERNAME  (seu email Gmail)
# Variável: MAIL_PASSWORD  (senha de app gerada no Google)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME}

# ── Melhor Envio ──────────────────────────────────────────
# Variável: ME_TOKEN  (token gerado em melhorenvio.com.br)
# Variável: APP_FRONTEND_URL  (ex: https://youngzone.up.railway.app)
app.frontend.url=${APP_FRONTEND_URL}

melhorenvio.token=${ME_TOKEN}
# (melhorenvio.cep.origem removido — usar loja.cep)

# ── Dados da loja ─────────────────────────────────────────
# Variável: LOJA_NOME
# Variável: LOJA_CPF
# Variável: LOJA_TELEFONE
# Variável: LOJA_EMAIL
# Variável: LOJA_CEP
# Variável: LOJA_RUA
# Variável: LOJA_NUMERO
# Variável: LOJA_COMPLEMENTO
# Variável: LOJA_BAIRRO
# Variável: LOJA_CIDADE
# Variável: LOJA_ESTADO
loja.nome=${LOJA_NOME}
loja.cpf=${LOJA_CPF}
loja.telefone=${LOJA_TELEFONE}
loja.email=${LOJA_EMAIL}
loja.cep=${LOJA_CEP}
loja.rua=${LOJA_RUA}
loja.numero=${LOJA_NUMERO}
loja.complemento=${LOJA_COMPLEMENTO:}
loja.bairro=${LOJA_BAIRRO}
loja.cidade=${LOJA_CIDADE}
loja.estado=${LOJA_ESTADO}

# ── Dimensões padrão da embalagem ────────────────────────
# Variável: PACOTE_PESO      (ex: 0.3)
# Variável: PACOTE_ALTURA    (ex: 5)
# Variável: PACOTE_LARGURA   (ex: 20)
# Variável: PACOTE_COMPRIMENTO (ex: 30)
loja.pacote.peso=${PACOTE_PESO:0.3}
loja.pacote.altura=${PACOTE_ALTURA:5}
loja.pacote.largura=${PACOTE_LARGURA:20}
loja.pacote.comprimento=${PACOTE_COMPRIMENTO:30}
