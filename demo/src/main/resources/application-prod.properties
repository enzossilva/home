loja.rua=${LOJA_RUA:Rua}
loja.numero=${LOJA_NUMERO:1}
loja.complemento=${LOJA_COMPLEMENTO:}
loja.bairro=${LOJA_BAIRRO:Centro}
loja.cidade=${LOJA_CIDADE:Sao Paulo}
