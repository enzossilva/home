# ── Produção — variáveis do Railway ──────────────────────────

# ── Banco de dados ─────────────────────────────────────────
# DATABASE_URL = postgresql://user:pass@host:port/db (fornecido pelo Railway)
spring.datasource.url=jdbc:${DATABASE_URL}
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}

# ── Mercado Pago ───────────────────────────────────────────
mercadopago.access-token=${MP_ACCESS_TOKEN:teste}
mercadopago.public-key=${MP_PUBLIC_KEY:teste}

# ── JWT ────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:eW91bmctem9uZS1iYWNrZW5kLXNlY3JldC1rZXktMjAyNC1sYXJnby1zdHJpbmctZm9yLWhtYWMtc2hhLTI1Ng==}
jwt.expiration=86400000

# ── Email ──────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@youngzone.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:noreply@youngzone.com}

# ── Melhor Envio ──────────────────────────────────────────
melhorenvio.token=${ME_TOKEN:}
melhorenvio.sandbox=${ME_SANDBOX:false}
app.frontend.url=${APP_FRONTEND_URL:https://localhost:3000}

# ── Dados da loja ─────────────────────────────────────────
loja.nome=${LOJA_NOME:Young Zone}
loja.cpf=${LOJA_CPF:00000000000}
loja.telefone=${LOJA_TELEFONE:11999999999}
loja.email=${LOJA_EMAIL:loja@youngzone.com}
